apiVersion: v1
kind: Secret
metadata:
  name: {{ include "open-swe.fullname" . }}
  labels:
    {{- include "open-swe.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.postgres.existingSecret }}
  database-url: "postgresql://{{ .Values.postgres.username }}:$(POSTGRES_PASSWORD)@{{ .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
  {{- else if .Values.postgres.password }}
  database-url: "postgresql://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
  {{- else }}
  database-url: "postgresql://{{ .Values.postgres.username }}@{{ .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
  {{- end }}

  {{- if .Values.redis.enabled }}
  {{- if .Values.redis.existingSecret }}
  redis-url: "redis://:$(REDIS_PASSWORD)@{{ .Values.redis.host }}:{{ .Values.redis.port }}/0"
  {{- else if .Values.redis.password }}
  redis-url: "redis://:{{ .Values.redis.password }}@{{ .Values.redis.host }}:{{ .Values.redis.port }}/0"
  {{- else }}
  redis-url: "redis://{{ .Values.redis.host }}:{{ .Values.redis.port }}/0"
  {{- end }}
  {{- end }}

  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
